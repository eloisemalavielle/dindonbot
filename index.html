<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DinDong c'est Dindonbot</title>
<style>

/* je logue mes polices de caractères */
@font-face {
  font-family: 'ChakraPetch';
  src: url('fonts/ChakraPetch-Medium.ttf') format('truetype');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'ChakraPetch';
  src: url('fonts/ChakraPetch-MediumItalic.ttf') format('truetype');
  font-weight: 500; font-style: italic;
}
@font-face {
  font-family: 'ChakraPetch';
  src: url('fonts/ChakraPetch-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal;
}
@font-face {
  font-family: 'ChakraPetch';
  src: url('fonts/ChakraPetch-BoldItalic.ttf') format('truetype');
  font-weight: 700; font-style: italic;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #080808;
  --white:  #f0ece4;
  --bot-bg: #b8c8e8;
  --bot-fg: #0f1520;
  --usr-bg: #d9808e;
  --usr-fg: #1a040a;
  --fin-fg: #aaaaaa;
  --font:   'ChakraPetch', 'Helvetica Neue', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: var(--font);
  font-weight: 500;
  overflow: hidden;
}

.ecran { position: fixed; inset: 0; display: none; flex-direction: column; }
.ecran.actif { display: flex; }

/* CSS - écran d'accueil - placer les éléments comme sur la maquette*/
#ecran-accueil {
  background: var(--bg);
  padding: clamp(1.2rem, 4vw, 2.5rem) clamp(1.5rem, 5vw, 4rem);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.acc-top {
  display: flex;
  justify-content: space-between;
  font-size: clamp(0.55rem, 1.2vw, 0.72rem);
  letter-spacing: 0.2em;
  opacity: 0.8;
  margin-bottom: 0.15rem;
}
.acc-titre {
  font-size: clamp(2.4rem, 8.5vw, 6.5rem);
  font-weight: 700;
  font-style: italic;
  text-align: center;
  text-transform: uppercase;
  line-height: 0.92;
  letter-spacing: -0.02em;
  margin-bottom: 0.45rem;
}
.acc-sous {
  font-size: clamp(0.65rem, 1.5vw, 0.88rem);
  letter-spacing: 0.04em;
  text-align: center;
  opacity: 0.65;
}
.acc-centre {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.acc-centre img {
  max-height: clamp(160px, 36vh, 300px);
  max-width: 55%;
  object-fit: contain;
}
.acc-bas {
  text-align: center;
  font-size: clamp(0.82rem, 2vw, 1rem);
  font-style: italic;
  opacity: 0.6;
  padding-bottom: 0.5rem;
  letter-spacing: 0.03em;
}

/* CSS - placement de mon gif au milieu de l'écran */
#ecran-gif {
  background: var(--bg);
  align-items: center;
  justify-content: center;
}
#ecran-gif img {
  max-width: min(80vw, 80vh);
  max-height: min(80vw, 80vh);
  object-fit: contain;
}

/* CSS - placement des éléments du chat principal*/
#ecran-chat { background: var(--bg); }

#radar-bg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(88vw, 88vh);
  height: min(88vw, 88vh);
  opacity: 0.10;
  pointer-events: none;
  z-index: 0;
  object-fit: contain;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 700px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 5;
}

#banner {
  flex-shrink: 0;
  height: clamp(52px, 9vw, 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 1rem;
}
#banner img { height: 75%; max-height: 62px; object-fit: contain; }

#chat-zone {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem 0.4rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
  scroll-behavior: smooth;
  min-height: 0;
}
#chat-zone::-webkit-scrollbar { width: 3px; }
#chat-zone::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 0.5rem;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.bot  { flex-direction: row; }
.msg-row.user { flex-direction: row-reverse; }

/* CSS - relatif à l'oraxle ici le dindon du chatbot */
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #111;
  border: 1px solid #222;
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar img { /*taille de la fdp du dindon*/
  width: 250%;
  height: 250%; 
  object-fit: cover;
  object-position: center top;
  display: block;
}

.bubble {
  max-width: min(74%, 460px);
  padding: 0.6rem 0.95rem;
  border-radius: 16px;
  font-size: clamp(0.8rem, 1.9vw, 0.92rem);
  line-height: 1.55;
  word-wrap: break-word;
}
.msg-row.bot .bubble {
  background: var(--bot-bg);
  color: var(--bot-fg);
  border-bottom-left-radius: 3px;
}
.msg-row.bot .bubble strong { font-weight: 700; }
.msg-row.user .bubble {
  background: var(--usr-bg);
  color: var(--usr-fg);
  border-bottom-right-radius: 3px;
  font-style: italic;
}

.dots { display: flex; gap: 4px; align-items: center; height: 1rem; }
.dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bot-fg); opacity: 0.3;
  animation: blink 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
  40%         { opacity: 1;   transform: scale(1); }
}

#choices-zone {
  flex-shrink: 0;
  padding: 0.5rem 1.1rem 0.9rem;
  display: none;
  flex-direction: column;
  gap: 0.45rem;
  align-items: flex-end;
}
#choices-zone.open { display: flex; }

.choice-btn {
  background: var(--usr-bg);
  color: var(--usr-fg);
  border: none;
  border-radius: 16px;
  border-bottom-right-radius: 3px;
  padding: 0.55rem 1rem;
  font-family: var(--font);
  font-weight: 500;
  font-style: italic;
  font-size: clamp(0.78rem, 1.9vw, 0.88rem);
  cursor: pointer;
  text-align: right;
  max-width: min(82%, 420px);
  line-height: 1.4;
  transition: background 0.15s, transform 0.1s;
  animation: fadeUp 0.3s ease both;
}
.choice-btn:hover  { background: #c06878; }
.choice-btn:active { transform: scale(0.97); }

.choice-btn.fin {
  background: transparent;
  color: var(--fin-fg);
  border: 1px solid #333;
  border-radius: 16px;
  border-bottom-right-radius: 3px;
  font-style: normal;
  font-size: clamp(0.7rem, 1.6vw, 0.8rem);
  letter-spacing: 0.04em;
  align-self: flex-end;
  margin-top: 0.2rem;
  padding: 0.4rem 0.85rem;
}
.choice-btn.fin:hover { background: #1a1a1a; color: #ccc; border-color: #555; }

.choice-btn:nth-child(1) { animation-delay: 0.00s; }
.choice-btn:nth-child(2) { animation-delay: 0.08s; }
.choice-btn:nth-child(3) { animation-delay: 0.16s; }
.choice-btn:nth-child(4) { animation-delay: 0.24s; }
.choice-btn:nth-child(5) { animation-delay: 0.32s; }

@media (max-width: 480px) {
  .acc-titre { font-size: clamp(2rem, 10vw, 3.5rem); }
  .bubble { max-width: 84%; }
}

</style>
</head>

</div>

<script>
'use strict';

/* ── Utilitaires écrans ─────────────────────── */
function afficher(id) {
  document.querySelectorAll('.ecran').forEach(function(e) { e.classList.remove('actif'); });
  document.getElementById(id).classList.add('actif');
}

/* ── Chargement des fragments ───────────────── */
function parseTxt(txt) {
  return txt.split('/').map(function(s){ return s.trim(); }).filter(Boolean);
}

var F = {
  adverbe: [], complement: [], gn_de_singulier: [], gn_pluriel: [], gn_singulier: [],
  interjections: [], nom_non_vivant: [], nom_vivant: [],
  verbe_conjugaison_pluriel: [], verbe_de_locution: [], verbe_de_solo: [],
  verbe_locution: [], verbe_que_conjugaison_pluriel: [], verbe_solo: [],
};

var FICHIERS = [
  'adverbe','complement','gn_de_singulier','gn_pluriel','gn_singulier','interjections',
  'nom_non_vivant','nom_vivant','verbe_conjugaison_pluriel',
  'verbe_de_locution', 'verbe_de_solo','verbe_locution','verbe_que_conjugaison_pluriel','verbe_solo',
];

Promise.all(
  FICHIERS.map(function(nom) {
    return fetch('fragments/' + nom + '.txt').then(function(r) { return r.text(); });
  })
).then(function(resultats) {
  FICHIERS.forEach(function(nom, i) { F[nom] = parseTxt(resultats[i]); });
  init();
}).catch(function(err) {
  console.warn('Fetch échoué — utilise Live Server.', err);
  F.adverbe                    = ['gaiement','à tâtons','étonnamment'];
  F.complement                 = ['qui sommeille en toi','que tu portes sans le savoir'];
  F.gn_pluriel                 = ['les plumes du destin','les orifices de la vérité'];
  F.gn_singulier               = ['un gloussement sourd','une révélation bulbeuse'];
  F.interjections              = ['Hou !','Croustillant...','Fascinant.'];
  F.nom_non_vivant             = ['le silence','la farce','le renflement'];
  F.nom_vivant                 = ["le dindon philosophe","l'oiseau du destin"];
  F.verbe_conjugaison_pluriel  = ['nous gloussons','ils frémissent'];
  F.verbe_de_locution          = ["d'observer","de battre des ailes"];
  F.verbe_locution             = ['prendre son envol','battre des ailes'];
  F.verbe_que_conjugaison_pluriel = ["qu'ils gloussent","que tu t'envoles"];
  F.verbe_solo                 = ['glousse','observe','frémit'];
  init();
});

/* ── Utilitaires ────────────────────────────── */
function pick(arr) {
  if (!arr || arr.length === 0) return '…';
  return arr[Math.floor(Math.random() * arr.length)];
}
function pickN(arr, n) {
  var copy = arr.slice();
  var result = [];
  for (var i = 0; i < n && copy.length > 0; i++) {
    var idx = Math.floor(Math.random() * copy.length);
    result.push(copy.splice(idx, 1)[0]);
  }
  return result;
}

/* ── État global ────────────────────────────── */
var userName = 'ami';                 // prénom courant
var questionsRestantes = [];          // pool qui se vide — FIX bug questions répétées

    function() {

    function() {

    function() {

    function() {

           + pick(F.gn_pluriel) + '.';
    },

    function() {
      return 'Pardonne ' + pick(F.gn_singulier) + ' <strong>' + p + '</strong>.'

    },

    function() {
      return 'Une petite quantit\u00e9 d\u2019' + pick(F.nom_non_vivant)

    },

    function() {
      return 'C\u2019est une vilaine manie '

           + ', tu devrais plut\u00f4t  '
           + pick(F.verbe_solo) + ' ' + pick(F.nom_vivant) + ' ça te ferait du bien.';
    },

    function() {
      return 'As-tu essay\u00e9 ' + pick(F.gn_singulier) + ' pour '
           + pick(F.verbe_locution) + '\u00a0? \u00c7a te soulagera d\u2019'
           + pick(F.nom_non_vivant) + ' ' + pick(F.complement) + '.';
    },

    function() {
      return 'L\u2019usage d\u2019' + pick(F.nom_vivant)
           + ' est d\u00e9conseill\u00e9 pour ta sant\u00e9 <strong>' + p + '</strong>,'
           + ' sinon tu risques ' + pick(F.verbe_de_solo)
           + ' ' + pick(F.gn_singulier) + '.';
    },

    function() {
      return '\u00c0 force ' + pick(F.verbe_de_locution) + ', tu vas finir par '
           + pick(F.verbe_locution) + ' ' + pick(F.adverbe)
           + ' <strong>' + p + '</strong>.';
    },

    function() {
      return 'Dire \u2019' + pick(F.interjections) + '\u2019 — ne serait-ce pas ta protection contre '
           + pick(F.nom_vivant) + ' ' + pick(F.complement) + '\u00a0?';
    },

    function() {
      return 'Chuchoter \u2019' + pick(F.interjections) + '\u2019 \u00e0 la mani\u00e8re '
           + pick(F.gn_de_singulier) + '\u00a0: meilleure technique de drague que '
           + pick(F.verbe_solo) + ' pour ' + pick(F.verbe_que_conjugaison_pluriel) + '.';
    },

    function() {
      return pick(F.gn_singulier) + ' c\u2019est commme '
           + pick(F.gn_singulier) + ' ' + pick(F.complement) + ' : plus il y a '
           + pick(F.verbe_solo) + ' mieux c\u2019est .';
    },

    function() {
      return 'Peu importe ' + pick(F.verbe_que_conjugaison_pluriel) + ' le principal étant ' + pick(F.verbe_de_locution) + ' sur  '
           + pick(F.nom_vivant) + ' .';
    },

    

  ];

  return pick(templates)();
}

/* ── DOM ────────────────────────────────────── */
var chatZone    = document.getElementById('chat-zone');

/* ── Helpers chat ───────────────────────────── */
function scrollBottom() {
  setTimeout(function() { chatZone.scrollTop = chatZone.scrollHeight; }, 60);
}

function mkAvatar() {
  var d = document.createElement('div');
  d.className = 'avatar';
  var img = document.createElement('img');
  img.src = 'images/dindon.png';
  img.alt = '';
  d.appendChild(img);
  return d;
}

function addMsg(html, role) {
  var row = document.createElement('div');
  row.className = 'msg-row ' + role;
  if (role === 'bot') row.appendChild(mkAvatar());
  var b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = html;
  row.appendChild(b);
  chatZone.appendChild(row);
  scrollBottom();
}

function showTyping() {
  var row = document.createElement('div');
  row.id = 'typing';
  row.className = 'msg-row bot';
  row.appendChild(mkAvatar());
  var b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(b);
  chatZone.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  var el = document.getElementById('typing');
  if (el) el.remove();
}

function botSay(html, delay, callback) {
  delay = delay || 950;
  showTyping();
  setTimeout(function() {
    removeTyping();
    addMsg(html, 'bot');
    if (callback) callback();
  }, delay);
}

/* ── Choix ──────────────────────────────────── */
function ouvrirChoix(options) {
  choicesZone.innerHTML = '';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn' + (opt.fin ? ' fin' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', function() {
      fermerChoix();
      opt.action();
    });
    choicesZone.appendChild(btn);
  });
  choicesZone.classList.add('open');
  setTimeout(scrollBottom, 50);
}

function fermerChoix() {
  choicesZone.classList.remove('open');
  choicesZone.innerHTML = '';
}

/* ── Retour accueil ─────────────────────────── */
function retourAccueil() {
  fermerChoix();
  botSay(pick(F.interjections) + ' ' + genPhrase(), 950, function() {
    botSay(pick(ADIEUX), 1200, function() {
      setTimeout(function() {
        afficher('ecran-accueil');
        attacherClicAccueil();
      }, 8000); /* temps d'attente entre le message d'adieu et le retour à l'accueil*/
    });
  });
}

/* ── Tour oracle ────────────────────────────── */
function tourOracle() {
  var double = Math.random() > 0.9;
  var phrase1 = genPhrase();
  if (double) {
    var phrase2 = genPhrase();
    botSay(phrase1, 1100, function() {
      botSay(phrase2, 1200, function() { proposerChoixUtilisateur(); });
    });
  } else {
    botSay(phrase1, 1100, function() { proposerChoixUtilisateur(); });
  }
}

/* ── Proposer questions — sans répétition ───── */
function proposerChoixUtilisateur() {
  // FIX : si le pool est vide ou presque, on le reremplit
  if (questionsRestantes.length < 3) {
    questionsRestantes = TEXTES.questions_utilisateur.slice();
  }

  // Pioche 3 questions SANS remise dans le pool restant
  var questions = [];
  for (var i = 0; i < 3 && questionsRestantes.length > 0; i++) {
    var idx = Math.floor(Math.random() * questionsRestantes.length);
    questions.push(questionsRestantes.splice(idx, 1)[0]);
  }

  var opts = questions.map(function(q) {
    return {
      label: q,
      action: (function(question) {
        return function() {
          addMsg(question, 'user');
          tourOracle();
        };
      })(q),
    };
  });
  opts.push({ label: TEXTES.label_fin, fin: true, action: retourAccueil });
  ouvrirChoix(opts);
}

/* ── Démarrer conversation ──────────────────── */
function demarrer() {
  userName = 'ami';
  questionsRestantes = TEXTES.questions_utilisateur.slice(); // reset pool
  chatZone.innerHTML = '';
  fermerChoix();

  botSay(pick(TEXTES.ouvertures), 1000, function() {
    afficherSaisiePrenom();
  });
}

function afficherSaisiePrenom() {
  choicesZone.innerHTML = '';
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;gap:0.5rem;align-items:flex-end;width:100%;padding:0.3rem 0;';

  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'tape ton petit blaze\u2026';
  input.autocomplete = 'off';
  input.spellcheck = false;
  input.style.cssText = [
    'flex:1','background:#111','border:1px solid #2a2a2a','border-radius:20px',
    'color:var(--white)','font-family:var(--font)','font-weight:500','font-style:italic',
    'font-size:clamp(0.8rem,1.9vw,0.9rem)','padding:0.6rem 1rem','outline:none','min-height:42px',
  ].join(';');

  var btn = document.createElement('button');
  btn.style.cssText = 'width:42px;height:42px;border-radius:50%;background:var(--usr-bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;';
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" style="fill:#1a040a"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>';

  function validerPrenom() {
    var val = input.value.trim();
    if (!val) return;
    fermerChoix();
    userName = val.split(/\s+/)[0];   // stocké globalement — accessible dans genPhrase()
    addMsg(val, 'user');

    var fn = pick(TEXTES.accueil);
    botSay(fn(userName), 1100, function() {
      ouvrirChoix([
        {
          label: TEXTES.choix_initial[0],
          action: function() {
            addMsg(TEXTES.choix_initial[0], 'user');
            botSay(genPhrase(), 1100, function() { tourOracle(); });
          },
        },
        {
          label: TEXTES.choix_initial[1],
          action: function() {
            addMsg(TEXTES.choix_initial[1], 'user');
            botSay(TEXTES.reponse_poule, 1000, function() {
              ouvrirChoix([
                {
                  label: TEXTES.apres_poule[0],
                  action: function() {
                    addMsg(TEXTES.apres_poule[0], 'user');
                    retourAccueil();
                  },
                },
                {
                  label: TEXTES.apres_poule[1],
                  action: function() {
                    addMsg(TEXTES.apres_poule[1], 'user');
                    tourOracle();
                  },
                },
              ]);
            });
          },
        },
        {
          label: TEXTES.choix_initial[2],
          action: function() {
            addMsg(TEXTES.choix_initial[2], 'user');
            retourAccueil();
          },
        },
      ]);
    });
  }

  btn.addEventListener('click', validerPrenom);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); validerPrenom(); }
  });

  wrapper.appendChild(input);
  wrapper.appendChild(btn);
  choicesZone.appendChild(wrapper);
  choicesZone.classList.add('open');
  setTimeout(function(){ input.focus(); }, 50);
}

/* ── Clic accueil ───────────────────────────── */
function attacherClicAccueil() {
  var el = document.getElementById('ecran-accueil');
  function handler() {
    el.removeEventListener('click', handler);
    afficher('ecran-gif');
    setTimeout(function() {
      afficher('ecran-chat');
      demarrer();
    }, 5000);
  }
  el.addEventListener('click', handler);
}

function init() {
  attacherClicAccueil();
}
</script>
</body>
</html>
